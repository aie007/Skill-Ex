apiVersion: apps/v1
kind: Deployment
metadata:
  name: dashboard-deployment
  namespace: skill-ex-demo
spec:
  replicas: 1
  selector:
    matchLabels:
      app: dashboard
  template:
    metadata:
      labels:
        app: dashboard
    spec:
      containers:
        - name: dashboard
          image: aie007/microservices-dashboard:latest
          ports:
            - containerPort: 8501