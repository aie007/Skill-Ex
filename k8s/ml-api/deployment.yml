apiVersion: apps/v1
kind: Deployment
metadata:
  name: ml-api-deployment
  namespace: skill-ex-demo 
spec:
  replicas: 1
  selector:
    matchLabels:
      app: ml-api
  template:
    metadata:
      labels:
        app: ml-api
    spec:
      containers:
        - name: ml-api
          image: aie007/microservices-ml-api:latest
          ports:
            - containerPort: 8000