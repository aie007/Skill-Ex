api:
  url: "https://jsearch.p.rapidapi.com/search"
  query: "software developer in India"
  total_pages: 30
  timeout: 50
  country: "in"

aws:
  raw_bucket: "amzn-s3-raw-bucket-skillex"
  processed_bucket: "amzn-s3-processed-bucket-skillex"

database:
  name: "backend/data/job_market.db"

# Critical for the ExperienceExtractor class
experience_levels:
  senior: "Senior|Lead|Principal|Staff|Architect"
  mid: "Mid|Intermediate|Experienced"
  junior: "Junior|Entry|Associate|Graduate|Intern"


