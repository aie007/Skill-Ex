apiVersion: apps/v1
kind: Deployment
metadata:
  name: elasticsearch
  namespace: skill-ex-demo
spec:
  replicas: 1
  selector:
    matchLabels:
      app: elasticsearch
  template:
    metadata:
      labels:
        app: elasticsearch
    spec:
      containers:
      - name: elasticsearch
        image: docker.elastic.co/elasticsearch/elasticsearch:7.17.13
        ports:
        - containerPort: 9200
          name: http
        - containerPort: 9300
          name: transport
        env:
        - name: discovery.type
          value: single-node
        - name: network.host
          value: "0.0.0.0"
        - name: http.port
          value: "9200"
        resources:
          limits:
            memory: "1Gi"
          requests:
            memory: "512Mi"
---
apiVersion: v1
kind: Service
metadata:
  name: elasticsearch
  namespace: skill-ex-demo
spec:
  selector:
    app: elasticsearch
  ports:
    - port: 9200
      targetPort: 9200
