apiVersion: apps/v1
kind: Deployment
metadata:
  name: elasticsearch
  namespace: skill-ex-demo
spec:
  replicas: 1
  selector:
    matchLabels:
      app: elasticsearch
  template:
    metadata:
      labels:
        app: elasticsearch
    spec:
      containers:
      - name: elasticsearch
        image: docker.elastic.co/elasticsearch/elasticsearch:7.17.0
        ports:
        - containerPort: 9200
        - containerPort: 9300
          env:
            - name: discovery.type
              value: single-node
          resources:
            limits:
              memory: "1Gi"
            requests:
              memory: "512Mi"
---
apiVersion: v1
kind: Service
metadata:
  name: elasticsearch
  namespace: skill-ex-demo
spec:
  selector:
    app: elasticsearch
  ports:
    - port: 9200
      targetPort: 9200
