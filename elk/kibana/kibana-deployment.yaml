apiVersion: apps/v1
kind: Deployment
metadata:
  name: kibana
  namespace: skill-ex-demo
spec:
  replicas: 1
  selector:
    matchLabels:
      app: kibana
  template:
    metadata:
      labels:
        app: kibana
    spec:
      containers:
        - name: kibana
          image: docker.elastic.co/kibana/kibana:7.17.13
          ports:
            - containerPort: 5601
          env:
            - name: ELASTICSEARCH_HOSTS
              value: "http://elasticsearch:9200"
            - name: server.port
              value: "5601"
            - name: server.host
              value: "0.0.0.0"
---
apiVersion: v1
kind: Service
metadata:
  name: kibana
  namespace: skill-ex-demo
spec:
  type: NodePort
  selector:
    app: kibana
  ports:
    - protocol: TCP
      port: 5601
      targetPort: 5601
      nodePort: 30601
