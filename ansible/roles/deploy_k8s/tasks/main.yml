---
- name: Create namespace
  shell: |
    unset http_proxy; unset https_proxy; unset no_proxy;
    kubectl create namespace {{ kube_namespace }} --dry-run=client -o yaml | kubectl apply -f - --validate=false
  # ignore_errors: true

- name: Delete existing model-training pods
  shell: |
    unset http_proxy; unset https_proxy; unset no_proxy;
    kubectl delete pods -l app=model-training -n {{ kube_namespace }} --ignore-not-found=true

- name: Delete existing dashboard pods
  shell: |
    unset http_proxy; unset https_proxy; unset no_proxy;
    kubectl delete pods -l app=dashboard -n {{ kube_namespace }} --ignore-not-found=true

- name: Delete existing mlflow pods
  shell: |
    unset http_proxy; unset https_proxy; unset no_proxy;
    kubectl delete pods -l app=mlflow -n {{ kube_namespace }} --ignore-not-found=true

- name: Delete existing ml-api pods
  shell: |
    unset http_proxy; unset https_proxy; unset no_proxy;
    kubectl delete pods -l app=ml-api -n {{ kube_namespace }} --ignore-not-found=true

- name: Create application secrets in Kubernetes
  shell: |
    kubectl create secret generic app-secrets \
      --from-literal=AWS_ACCESS_KEY_ID="{{ aws_access_key }}" \
      --from-literal=AWS_SECRET_ACCESS_KEY="{{ aws_secret_access_key }}" \
      --from-literal=RAPIDAPI_KEY="{{ rapidapi_key }}" \
      --from-literal=MLFLOW_TRACKING_URI="{{ mlflow_tracking_uri }}" \
      --from-literal=AWS_RAW_BUCKET="{{ aws_raw_bucket }}" \
      --from-literal=AWS_PROCESSED_BUCKET="{{ aws_processed_bucket }}" \
      --from-literal=AWS_MODELS_BUCKET="{{ aws_models_bucket }}" \
      -n {{ kube_namespace }} --dry-run=client -o yaml | kubectl apply -f -

- name: Remove old model-training deployment if it exists
  shell: |
    kubectl delete deployment model-training-deployment -n {{ kube_namespace }} --ignore-not-found=true

- name: Delete existing model-training cronjob
  shell: |
    unset http_proxy; unset https_proxy; unset no_proxy;
    kubectl delete cronjob model-training-cronjob -n {{ kube_namespace }} --ignore-not-found=true

- name: Delete existing ingestion cronjob
  shell: |
    unset http_proxy; unset https_proxy; unset no_proxy;
    kubectl delete cronjob ingestion-cronjob -n {{ kube_namespace }} --ignore-not-found=true

- name: Apply model-training cronjob
  shell: |
    unset http_proxy; unset https_proxy; unset no_proxy;
    kubectl apply -f ../k8s/model-training/cronjob.yml -n {{ kube_namespace }}

- name: Apply ingestion cronjob
  shell: |
    unset http_proxy; unset https_proxy; unset no_proxy;
    kubectl apply -f ../k8s/ingestion/cronjob.yml -n {{ kube_namespace }}

- name: Deploy dashboard
  shell: |
    unset http_proxy; unset https_proxy; unset no_proxy;
    kubectl apply -f ../k8s/dashboard -n {{ kube_namespace }}

- name: Deploy mlflow
  shell: |
    unset http_proxy; unset https_proxy; unset no_proxy;
    kubectl apply -f ../k8s/mlflow -n {{ kube_namespace }}

- name: Deploy ml-api
  shell: |
    unset http_proxy; unset https_proxy; unset no_proxy;
    kubectl apply -f ../k8s/ml-api -n {{ kube_namespace }} 

