---
- name: Create namespace
  shell: |
    unset http_proxy; unset https_proxy; unset no_proxy;
    kubectl create namespace skill-ex-demo --dry-run=client -o yaml | kubectl apply -f - --validate=false
  ignore_errors: true

- name: Delete existing model-training pod
  shell: |
    unset http_proxy; unset https_proxy; unset no_proxy;
    kubectl delete pod model-training-deployment-0 -n skill-ex-demo
  ignore_errors: true

- name: Delete existing dashboard pod
  shell: |
    unset http_proxy; unset https_proxy; unset no_proxy;
    kubectl delete pod dashboard-deployment-0 -n skill-ex-demo
  ignore_errors: true

- name: Delete existing mlflow pod
  shell: |
    unset http_proxy; unset https_proxy; unset no_proxy;
    kubectl delete pod mlflow-deployment-0 -n skill-ex-demo
  ignore_errors: true

- name: Delete existing ml-api pod
  shell: |
    unset http_proxy; unset https_proxy; unset no_proxy;
    kubectl delete pod ml-api-deployment-0 -n skill-ex-demo
  ignore_errors: true

- name: Deploy model-training
  shell: |
    unset http_proxy; unset https_proxy; unset no_proxy;
    kubectl apply -f k8s/model-training/deployment.yaml -n skill-ex-demo --validate=false

- name: Deploy dashboard
  shell: |
    unset http_proxy; unset https_proxy; unset no_proxy;
    kubectl apply -f k8s/dashboard/deployment.yaml -n skill-ex-demo --validate=false

- name: Deploy mlflow
  shell: |
    unset http_proxy; unset https_proxy; unset no_proxy;
    kubectl apply -f k8s/mlflow/deployment.yaml -n skill-ex-demo --validate=false

- name: Deploy ml-api
  shell: |
    unset http_proxy; unset https_proxy; unset no_proxy;
    kubectl apply -f k8s/ml-api/deployment.yaml -n skill-ex-demo --validate=false

# ELK Deployment
