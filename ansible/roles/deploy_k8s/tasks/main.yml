  shell: |
    unset http_proxy; unset https_proxy; unset no_proxy;
    kubectl apply -f elk/elasticsearch/ -n skill-ex-demo --validate=false

- name: Deploy Logstash
  shell: |
    unset http_proxy; unset https_proxy; unset no_proxy;
