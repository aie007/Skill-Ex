    <div id="cookie-banner" {% if show_banner %} style="display: flex;" {% else %} style="display: none;" {% endif %}>
        <div class="banner-text">
            We use cookies to serve personalized content. By clicking "Accept", you consent to our use of cookies. 
            Some features may be unavailable without your consent. You can always modify your consent from <a href="" onclick="showCookiesPopup()">cookies settings</a>.
        </div>
        <div class="banner-buttons">
            <button onclick="sendConsent('reject', 'cookie-banner')" class="btn btn-reject" id="reject-btn">Reject</button>
            <button onclick="sendConsent('accept', 'cookie-banner')" class="btn btn-accept" id="accept-btn">Accept</button>
        </div>
    </div>

    <script>
        async function sendConsent(choice, parentElementId) {
            document.getElementById(parentElementId).style.display = 'none';
            await fetch(`/set-consent?choice=${choice}`, { method: 'POST' });
        }
        function showCookiesPopup() {
            document.getElementById('cookie-popup').style.display = 'flex';
        }
    </script>
